name: Deploy Model to Production

on:
  push:
    branches:
      - main
  pull_request:
    types: [closed]
    branches:
      - main


env:
  AWS_REGION: us-east-1
  S3_MODEL: s3://practica.mlops.2026/ejemplo.studio/model/model.tar.gz
  S3_TEST_DATA: s3://practica.mlops.2026/ejemplo.studio/processed/test.csv

jobs:
  validate:
    runs-on: ubuntu-latest
    # Execute ONLY if the pull request was merged successfully, not just closed.
    if: github.event.pull_request.merged == true
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 pandas scikit-learn joblib

      - name: Validate Model Precision (> 0.6) from S3
        id: validation
        run: |
          python scripts/validate_model_s3.py \
            --model-s3 ${{ env.S3_MODEL }} \
            --data-s3 ${{ env.S3_TEST_DATA }} \
            --threshold 0.6
            
  deploy:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    
    steps:
      - name: Deploy to Production
        run: |
          echo "✅ Validation passed successfully (precision > 0.6)."
          echo "🚀 Deploying model artifacts..."
          # Insert actual deployment logic here (e.g., SageMaker Endpoints or API deploy)
          echo "Deployment complete."
